<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Log — Gustav</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #e63946;
      --gold: #f4c430;
      --green: #2ecc71;
      --blue: #3a86ff;
      --purple: #8338ec;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      max-width: 860px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
    }
    .filter-btn.active { color: var(--text); border-color: var(--accent); background: var(--surface2); }

    .log-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .log-entry:hover { border-color: #444; }

    .entry-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .entry-status {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .entry-main { flex: 1; }
    .entry-summary {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .entry-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .entry-time { font-size: 0.75rem; color: var(--muted); }
    .entry-category {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cat-Setup { background: rgba(58,134,255,0.15); color: var(--blue); }
    .cat-Content { background: rgba(244,196,48,0.15); color: var(--gold); }
    .cat-Automation { background: rgba(131,56,236,0.15); color: var(--purple); }
    .cat-Research { background: rgba(46,204,113,0.15); color: var(--green); }
    .cat-System { background: rgba(230,57,70,0.15); color: var(--accent); }
    .cat-Social { background: rgba(244,162,97,0.15); color: #f4a261; }

    .expand-icon {
      color: var(--muted);
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-top: 3px;
      transition: transform 0.2s;
    }
    .log-entry.open .expand-icon { transform: rotate(180deg); }

    .entry-detail {
      display: none;
      padding: 0 16px 14px 42px;
      font-size: 0.82rem;
      line-height: 1.7;
      color: #aaa;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .log-entry.open .entry-detail { display: block; }

    .entry-id {
      font-size: 0.7rem;
      color: #555;
      flex-shrink: 0;
      margin-top: 3px;
      font-family: monospace;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat { font-size: 0.8rem; color: var(--muted); }
    .stat strong { color: var(--text); }

    footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <h1>Activity Log <span>// Gustav</span></h1>
  <a href="index.html" class="back-link">← Mission Control</a>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all', this)">All</button>
  <button class="filter-btn" onclick="filter('Setup', this)">Setup</button>
  <button class="filter-btn" onclick="filter('Content', this)">Content</button>
  <button class="filter-btn" onclick="filter('Automation', this)">Automation</button>
  <button class="filter-btn" onclick="filter('Research', this)">Research</button>

  const statusIcon = { success: '✅', error: '❌', inprogress: '🔄' };

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) + ' · ' +
           d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function render(entries) {
    const container = document.getElementById('logContainer');
    container.innerHTML = '';
    [...entries].reverse().forEach(entry => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.dataset.category = entry.category;
      div.innerHTML = `
        <div class="entry-header" onclick="toggle(this)">
          <div class="entry-status">${statusIcon[entry.status] || '•'}</div>
          <div class="entry-main">
            <div class="entry-summary">${entry.summary}</div>
            <div class="entry-meta">
              <span class="entry-time">${formatTime(entry.timestamp)}</span>
              <span class="entry-category cat-${entry.category}">${entry.category}</span>
            </div>
          </div>
          <div class="entry-id">#${entry.id}</div>
          <div class="expand-icon">▼</div>
        </div>
        <div class="entry-detail">${entry.detail}</div>
      `;
      container.appendChild(div);
    });

    // Stats
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><strong>${entries.length}</strong> total actions</div>
      <div class="stat"><strong>${entries.filter(e=>e.status==='success').length}</strong> succeeded</div>
      <div class="stat"><strong>${entries.filter(e=>e.status==='error').length}</strong> failed</div>
      <div class="stat">Last action: <strong>${formatTime(entries[entries.length-1]?.timestamp)}</strong></div>
    `;
  }

  function toggle(header) {
    header.parentElement.classList.toggle('open');
  }

  let currentFilter = 'all';
  function filter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'all' ? LOG_DATA : LOG_DATA.filter(e => e.category === cat);
    render(filtered);
  }

</html>
